name: Force sync upstream danmu_api

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream & fetch
        run: |
          git remote add upstream https://github.com/huangxd-/danmu_api.git
          git fetch upstream

      - name: Hard reset main to upstream/main
        run: |
          git checkout main
          git reset --hard upstream/main
          git push --force origin main
