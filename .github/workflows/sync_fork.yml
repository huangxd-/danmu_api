name: Fork Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *"  # 每天午夜执行
  workflow_dispatch:

jobs:
  sync_with_upstream:
    name: Sync with Upstream
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/huangxd-/danmu_api.git || true
          git fetch upstream main

      - name: Sync main branch
        run: |
          git checkout main
          git merge --ff-only upstream/main

      - name: Push changes
        run: |
          git push origin main

      - name: Check for new commits
        if: success()
        run: echo "Sync completed successfully"

      - name: Check for Failure
        if: failure()
        run: |
          echo "[Error] Sync failed. This might be due to:"
          echo "1. Merge conflicts that need manual resolution"
          echo "2. Force-push/diverged history in target repo"
          echo "3. Network issues"
          echo "Please check the logs and consider manual sync if needed."
          exit 1
